name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via FTP (lftp mirror)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          lftp -e "set ftp:ssl-allow no; set ftp:use-feat no; mirror -R --delete --verbose dist/ public_html/; quit" \
            -u "$FTP_USER","$FTP_PASS" \
            -p "$FTP_PORT" \
            "$FTP_HOST"

      - name: Purge LiteSpeed cache
        run: |
          curl -s -o /dev/null -H 'X-LiteSpeed-Purge: *' 'https://rudhramenterprises.com/'
