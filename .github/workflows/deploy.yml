name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install lftp
        run: sudo apt-get update -qq && sudo apt-get install -y -qq lftp

      - name: Deploy via FTP (lftp mirror)
        run: |
          lftp -c "
            set ftp:ssl-allow no;
            set ftp:use-feat no;
            open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} -p ${{ secrets.FTP_PORT }} ${{ secrets.FTP_HOST }};
            mirror -R --delete --verbose dist/ public_html/
          "

      - name: Purge LiteSpeed cache
        run: curl -s -o /dev/null -H 'X-LiteSpeed-Purge: *' 'https://rudhramenterprises.com/'
