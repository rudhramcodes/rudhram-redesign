name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy via FTP (curl)
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USERNAME }}
          FTP_PASS: ${{ secrets.FTP_PASSWORD }}
          FTP_PORT: ${{ secrets.FTP_PORT }}
        run: |
          cd dist
          find . -type f | while read file; do
            remote="public_html/${file#./}"
            echo "Uploading: $file -> $remote"
            curl -s --ftp-create-dirs --ftp-skip-pasv-ip \
              --user "$FTP_USER:$FTP_PASS" \
              -T "$file" \
              "ftp://$FTP_HOST:$FTP_PORT/$remote" || echo "FAILED: $file"
          done

      - name: Purge LiteSpeed cache
        run: |
          curl -s -o /dev/null -H 'X-LiteSpeed-Purge: *' 'https://rudhramenterprises.com/'
